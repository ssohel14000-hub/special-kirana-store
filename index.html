<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Kirana Store</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f3f6f4;
}

header{
background:#1b5e20;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
margin:0;
font-size:20px;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
margin:2px;
cursor:pointer;
font-size:12px;
}

.hero{
height:180px;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1604719312566-8912e0e3f75c?q=80&w=1400');
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h2{
margin:0;
font-size:24px;
}

.container{
padding:10px;
}

.searchBox{
margin:10px 0;
text-align:center;
}

.searchBox input{
padding:8px;
width:90%;
max-width:300px;
border-radius:8px;
border:1px solid #ccc;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h4{
margin:5px 0;
}

.low{
color:red;
font-size:12px;
}

.cartBtn{
position:fixed;
bottom:15px;
right:15px;
background:#1b5e20;
padding:12px;
border-radius:50px;
color:white;
font-weight:bold;
}

.adminPanel{
background:#e8f5e9;
padding:8px;
display:none;
}

.dark{
background:#111;
color:white;
}

.dark .card{
background:#2b2b2b;
color:white;
}

.dark header{
background:#000;
}

.logo{
height:35px;
border-radius:6px;
}

</style>
</head>
<body>

<header>
<div>
<img id="logoImg" class="logo">
</div>
<h1>🛒 Special Kirana Store</h1>
<div>
<button onclick="toggleDark()">🌙</button>
<button onclick="login()">Admin</button>
</div>
</header>

<div class="hero">
<h2>Welcome in Special Kirana Store</h2>
<p>Premium Grocery Mall Experience</p>
<input type="file" onchange="uploadLogo(event)">
</div>

<div class="container">

<div style="text-align:center;margin:8px;">
📊 Sales ₹<span id="sales">0</span> |
💰 Profit ₹<span id="profit">0</span> |
🧾 Orders <span id="orders">0</span>
</div>

<div class="adminPanel" id="adminPanel">
<button onclick="addProduct()">Add</button>
<button onclick="changeLogin()">Change Login</button>
<button onclick="changeWA()">Change WhatsApp</button>
<button onclick="backup()">Backup</button>
<button onclick="restore()">Restore</button>
<button onclick="logout()">Logout</button>
</div>

<div class="searchBox">
<input type="text" id="search" placeholder="Search product..." onkeyup="render()">
</div>

<div id="products" class="grid"></div>

</div>

<div class="cartBtn" onclick="checkout()">
Cart ₹<span id="cartTotal">0</span>
</div>

<script>

let products=JSON.parse(localStorage.getItem("products"))||[
{name:"Atta",sp:30,cp:20,stock:20,unit:"kg"},
{name:"Rice",sp:55,cp:40,stock:15,unit:"kg"}
];

let cart=[];
let sales=Number(localStorage.getItem("sales"))||0;
let profit=Number(localStorage.getItem("profit"))||0;
let orders=Number(localStorage.getItem("orders"))||0;

if(!localStorage.getItem("login")){
localStorage.setItem("login",JSON.stringify({u:"admin",p:"1234"}));
}
if(!localStorage.getItem("wa")){
localStorage.setItem("wa","919876543210");
}

function render(){
let html="";
let search=document.getElementById("search").value.toLowerCase();

products.forEach((p,i)=>{
if(p.name.toLowerCase().includes(search)){
html+=`
<div class="card">
<h4>${p.name}</h4>
₹${p.sp}<br>
Stock: ${p.stock} ${p.unit}
${p.stock<5?'<div class="low">Low Stock</div>':""}
<br>
<button onclick="addCart(${i})">Add</button>
${admin?`
<button onclick="edit(${i})">Edit</button>
<button onclick="del(${i})">Delete</button>`:""}
</div>`;
}
});

document.getElementById("products").innerHTML=html;
updateStats();
updateCart();
}

let admin=false;

function addCart(i){
if(products[i].stock<=0) return alert("Out of Stock");
cart.push(i);
products[i].stock--;
render();
}

function updateCart(){
let total=0;
cart.forEach(i=> total+=products[i].sp);
document.getElementById("cartTotal").innerText=total;
}

function checkout(){
if(cart.length==0) return alert("Cart Empty");

let id="ORD"+Date.now();
let msg=`Order ID:${id}%0A`;

let total=0;
cart.forEach(i=>{
msg+=`${products[i].name} - ₹${products[i].sp}%0A`;
total+=products[i].sp;
profit+=(products[i].sp-products[i].cp);
});

msg+=`Total: ₹${total}`;

sales+=total;
orders++;

localStorage.setItem("sales",sales);
localStorage.setItem("profit",profit);
localStorage.setItem("orders",orders);
localStorage.setItem("products",JSON.stringify(products));

let wa=localStorage.getItem("wa");
window.open(`https://wa.me/${wa}?text=${msg}`);

cart=[];
render();
}

function login(){
let u=prompt("Username");
let p=prompt("Password");
let cred=JSON.parse(localStorage.getItem("login"));
if(u==cred.u&&p==cred.p){
admin=true;
document.getElementById("adminPanel").style.display="block";
render();
}
}

function logout(){
admin=false;
document.getElementById("adminPanel").style.display="none";
render();
}

function addProduct(){
let n=prompt("Name");
let sp=Number(prompt("Selling Price"));
let cp=Number(prompt("Cost Price"));
let st=Number(prompt("Stock"));
let unit=prompt("Unit");
products.push({name:n,sp,cp,stock:st,unit});
localStorage.setItem("products",JSON.stringify(products));
render();
}

function edit(i){
products[i].sp=Number(prompt("New SP",products[i].sp));
products[i].stock=Number(prompt("New Stock",products[i].stock));
localStorage.setItem("products",JSON.stringify(products));
render();
}

function del(i){
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
render();
}

function changeLogin(){
let u=prompt("New Username");
let p=prompt("New Password");
localStorage.setItem("login",JSON.stringify({u,p}));
}

function changeWA(){
let w=prompt("New WhatsApp with country code");
localStorage.setItem("wa",w);
}

function toggleDark(){
document.body.classList.toggle("dark");
}

function uploadLogo(e){
let reader=new FileReader();
reader.onload=function(){
localStorage.setItem("logo",reader.result);
document.getElementById("logoImg").src=reader.result;
}
reader.readAsDataURL(e.target.files[0]);
}

document.getElementById("logoImg").src=localStorage.getItem("logo")||"";

function backup(){
alert(JSON.stringify(products));
}

function restore(){
let d=prompt("Paste Backup");
if(d){
products=JSON.parse(d);
localStorage.setItem("products",d);
render();
}
}

render();

</script>

</body>
</html>
