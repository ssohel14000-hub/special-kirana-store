<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Kirana Store</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f5;
transition:.3s;
}

.dark{
background:#121212;
color:white;
}

header{
background:#2e7d32;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:6px 10px;
margin:4px;
border-radius:6px;
font-size:13px;
}

.hero{
min-height:260px;
background-image:
linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
url("https://images.unsplash.com/photo-1604719312566-8912e9c8a213?auto=format&fit=crop&w=1200&q=80");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
font-size:22px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.dark .card{
background:#222;
}

.fixed{
position:fixed;
bottom:10px;
right:10px;
}

.hidden{
display:none;
}

.low{
color:red;
font-weight:bold;
}

input{
padding:5px;
border-radius:5px;
border:1px solid #ccc;
margin:3px;
width:120px;
}

</style>
</head>

<body>

<header>
🛒 Special Kirana Store
<div>
<button onclick="toggleDark()">🌙</button>
<button onclick="login()">Admin</button>
</div>
</header>

<div class="hero">
Welcome in Special Kirana Store
</div>

<div style="padding:8px">
📊 Sales ₹<span id="sales">0</span> |
💰 Profit ₹<span id="profit">0</span> |
🧾 Orders <span id="orders">0</span> |
💵 GST ₹<span id="gstTotal">0</span>
</div>

<div id="adminPanel" class="hidden" style="padding:8px">
<button onclick="addProduct()">Add Product</button>
<button onclick="changeLogin()">Change Login</button>
<button onclick="changeWA()">Change WhatsApp</button>
<button onclick="setGST()">Set GST %</button>
<button onclick="backup()">Backup</button>
<button onclick="restore()">Restore</button>
<button onclick="logout()">Logout</button>
</div>

<div style="padding:10px">
<input id="codeInput" placeholder="Enter Product Code">
<button onclick="addByCode()">Add By Code</button>
</div>

<div id="products" class="grid"></div>

<div class="fixed">
<button onclick="checkout()">Checkout ₹<span id="cartTotal">0</span></button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
{name:"Atta",code:"ATTA01",sp:30,cp:25,stock:20,unit:"kg"},
{name:"Rice",code:"RICE01",sp:55,cp:48,stock:20,unit:"kg"},
{name:"Chana",code:"CHANA01",sp:80,cp:70,stock:50,unit:"kg"}
];

let sales=Number(localStorage.getItem("sales"))||0;
let profit=Number(localStorage.getItem("profit"))||0;
let orders=Number(localStorage.getItem("orders"))||0;
let gstPercent=Number(localStorage.getItem("gstPercent"))||5;
let whatsapp=localStorage.getItem("wa")||"91XXXXXXXXXX";
let admin=false;
let cartTotal=0;

let user=localStorage.getItem("user")||"admin";
let pass=localStorage.getItem("pass")||"1234";

function render(){
document.getElementById("products").innerHTML="";
products.forEach((p,i)=>{
let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<b>${p.name}</b><br>
Code: ${p.code}<br>
₹${p.sp}<br>
Stock: ${p.stock} ${p.unit || ""}<br>
<button onclick="addCart(${i})">+</button>
`;

if(admin){
card.innerHTML+=`
<button onclick="editProduct(${i})">Edit</button>
<button onclick="deleteProduct(${i})">Delete</button>
`;
}

if(p.stock<=5){
card.innerHTML+=`<div class="low">Low Stock</div>`;
}

document.getElementById("products").appendChild(card);
});

updateStats();
}

function addCart(i){
if(products[i].stock>0){
products[i].stock--;
cartTotal+=products[i].sp;
render();
updateCart();
}
}

function updateCart(){
document.getElementById("cartTotal").innerText=cartTotal;
}

function updateStats(){
document.getElementById("sales").innerText=sales;
document.getElementById("profit").innerText=profit;
document.getElementById("orders").innerText=orders;
document.getElementById("gstTotal").innerText=Math.round((sales*gstPercent)/100);
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("sales",sales);
localStorage.setItem("profit",profit);
localStorage.setItem("orders",orders);
}

function checkout(){
if(cartTotal==0)return;
sales+=cartTotal;
profit+=Math.round(cartTotal*0.2);
orders++;
let text="New Order%0ATotal: ₹"+cartTotal;
window.open("https://wa.me/"+whatsapp+"?text="+text);
cartTotal=0;
render();
updateCart();
}

function login(){
let u=prompt("Username");
let p=prompt("Password");
if(u==user && p==pass){
admin=true;
document.getElementById("adminPanel").classList.remove("hidden");
render();
}
}

function logout(){
admin=false;
document.getElementById("adminPanel").classList.add("hidden");
render();
}

function addProduct(){
let name=prompt("Name");
let code=prompt("Code");
let sp=prompt("Selling Price");
let cp=prompt("Cost Price");
let stock=prompt("Stock");
let unit=prompt("Unit (kg/pc/litre)");

products.push({name,code,sp:Number(sp),cp:Number(cp),stock:Number(stock),unit});
render();
}

function editProduct(i){
let sp=prompt("New Selling Price",products[i].sp);
let stock=prompt("New Stock",products[i].stock);
products[i].sp=Number(sp);
products[i].stock=Number(stock);
render();
}

function deleteProduct(i){
products.splice(i,1);
render();
}

function changeLogin(){
user=prompt("New Username");
pass=prompt("New Password");
localStorage.setItem("user",user);
localStorage.setItem("pass",pass);
}

function changeWA(){
whatsapp=prompt("New WhatsApp Number with country code");
localStorage.setItem("wa",whatsapp);
}

function setGST(){
gstPercent=prompt("GST %");
localStorage.setItem("gstPercent",gstPercent);
updateStats();
}

function backup(){
alert(JSON.stringify(products));
}

function restore(){
let data=prompt("Paste Backup Data");
products=JSON.parse(data);
render();
}

function toggleDark(){
document.body.classList.toggle("dark");
}

render();

</script>
</body>
</html>
