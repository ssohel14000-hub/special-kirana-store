<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Special Kirana Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f8f4;
}

/* Header */
header{
background:#2e7d32;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
}

header h3{
margin:0;
}

/* Hero */
.hero{
position:relative;
height:280px;
overflow:hidden;
}

.hero img{
width:100%;
height:280px;
object-fit:cover;
position:absolute;
z-index:-1;
}

.hero-overlay{
background:rgba(0,0,0,0.5);
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h2{
font-size:32px;
margin:0;
letter-spacing:1px;
}

.hero p{
margin-top:8px;
font-size:15px;
opacity:0.9;
}

/* Products */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

.price{
color:#2e7d32;
font-weight:bold;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

button:hover{
background:#1b5e20;
}

/* Cart Box */
.cart-box{
position:fixed;
bottom:15px;
right:15px;
background:#2e7d32;
color:white;
padding:12px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<header>
<h3>🛒 Special Kirana Store</h3>
<button onclick="login()">Login</button>
</header>

<div class="hero">
<img src="https://images.pexels.com/photos/264636/pexels-photo-264636.jpeg">
<div class="hero-overlay">
<h2>Welcome to Special Kirana Store</h2>
<p>Fresh Grocery at Best Price</p>
</div>
</div>

<div class="products" id="productList"></div>

<div class="cart-box" id="cartBox">
Cart: ₹0 <br>
<a id="waLink" target="_blank">
<button style="background:#25D366;margin-top:5px;">Order on WhatsApp</button>
</a>
</div>

<script>
let cartTotal=0;
let whatsappNumber="919876543210"; // Yaha apna number dalein

let items=[
{name:"Atta (1kg)",price:30},
{name:"Rice (1kg)",price:55},
{name:"Dal (1kg)",price:120},
{name:"Sugar (1kg)",price:45},
{name:"Salt (1kg)",price:25},
{name:"Oil (1L)",price:140},
{name:"Tea (500g)",price:220},
{name:"Milk Powder",price:320},
{name:"Biscuits Pack",price:30},
{name:"Soap",price:35},
{name:"Shampoo",price:150},
{name:"Toothpaste",price:90},
{name:"Detergent",price:110},
{name:"Masala Packet",price:20},
{name:"Maggi",price:15},
{name:"Chana (1kg)",price:80},
{name:"Besan (1kg)",price:95},
{name:"Cornflakes",price:180},
{name:"Jam Bottle",price:140},
{name:"Butter",price:50}
];

function renderItems(){
let html="";
items.forEach((item,index)=>{
html+=`
<div class="card">
<h4>${item.name}</h4>
<p class="price">₹${item.price}</p>
Qty: <input type="number" id="qty${index}" value="1" min="1" style="width:50px;">
<br>
<button onclick="addToCart(${item.price},${index})">Add to Cart</button>
</div>`;
});
document.getElementById("productList").innerHTML=html;
}

function addToCart(price,index){
let qty=document.getElementById("qty"+index).value;
cartTotal+=price*qty;
document.getElementById("cartBox").innerHTML=
`Cart: ₹${cartTotal}<br>
<a href="https://wa.me/${whatsappNumber}?text=I want to order items worth ₹${cartTotal}" target="_blank">
<button style="background:#25D366;margin-top:5px;">Order on WhatsApp</button>
</a>`;
}

function login(){
let pass=prompt("Enter Admin Password:");
if(pass==="1234"){
alert("Admin Logged In");
}else{
alert("Wrong Password");
}
}

renderItems();
</script>

</body>
</html>
