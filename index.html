<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Kirana Store</title>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2}
header{background:#1b5e20;color:white;padding:12px;display:flex;justify-content:space-between;align-items:center}
button{background:#2e7d32;color:white;border:none;padding:6px 10px;margin:3px;border-radius:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:10px}
.card{background:white;padding:10px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.hero{height:160px;background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1604719312566-8912e0e3f75c');
background-size:cover;background-position:center;
display:flex;flex-direction:column;align-items:center;justify-content:center;color:white}
.cartBtn{position:fixed;bottom:20px;right:20px;border-radius:40px;padding:12px 20px}
.popup{position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center}
.popupContent{background:white;padding:15px;border-radius:12px;width:90%;max-width:400px}
input{width:100%;padding:6px;margin:5px 0;border-radius:6px;border:1px solid #ccc}
.hidden{display:none}
.dark{background:#1e1e1e;color:white}
</style>
</head>

<body>

<header>
<div>🛒 Special Kirana Store</div>
<div>
<button onclick="toggleDark()">🌙</button>
<button onclick="login()">Admin</button>
</div>
</header>

<div class="hero">
<h2>Welcome in Special Kirana Store</h2>
<p>Premium Grocery Mall Experience</p>
</div>

<div style="padding:10px">
📊 Sales ₹<span id="sales">0</span> |
💰 Profit ₹<span id="profit">0</span> |
📦 Orders <span id="orders">0</span>
</div>

<div style="padding:10px">
<input placeholder="Search product..." onkeyup="search(this.value)">
</div>

<div id="adminPanel" class="hidden" style="padding:10px">
<button onclick="addProduct()">Add Product</button>
<button onclick="changeCred()">Change Login</button>
<button onclick="changeWA()">Change WhatsApp</button>
<button onclick="logout()">Logout</button>
</div>

<div id="products" class="grid"></div>

<button class="cartBtn" onclick="openCart()">Cart ₹<span id="cartTotal">0</span></button>

<div class="popup" id="cartPopup">
<div class="popupContent">
<h3>Your Cart</h3>
<div id="cartItems"></div>
<hr>
<input id="custName" placeholder="Customer Name">
<input id="custPhone" placeholder="Customer Phone">
<button onclick="placeOrder()">Place Order</button>
<button onclick="clearCart()">Clear</button>
<button onclick="closeCart()">Close</button>
</div>
</div>

<script>
let products=JSON.parse(localStorage.getItem("products"))||[
{name:"Chana",sp:80,cp:60,stock:20,unit:"kg",sold:0},
{name:"Rice",sp:50,cp:35,stock:15,unit:"kg",sold:0}
];

let cart=[];
let admin=false;
let sales=Number(localStorage.getItem("sales"))||0;
let profit=Number(localStorage.getItem("profit"))||0;
let orders=Number(localStorage.getItem("orders"))||0;

if(!localStorage.getItem("cred")){
localStorage.setItem("cred",JSON.stringify({u:"admin",p:"1234"}));
}
if(!localStorage.getItem("wa")){
localStorage.setItem("wa","919876543210");
}

function render(){
let box=document.getElementById("products");
box.innerHTML="";
products.forEach((p,i)=>{
box.innerHTML+=`
<div class="card">
<b>${p.name}</b><br>
₹${p.sp}<br>
Stock: ${p.stock} ${p.unit}<br>
<button onclick="addCart(${i})">Add</button>
${admin?`
<button onclick="edit(${i})">Edit</button>
<button onclick="del(${i})">Delete</button>`:""}
</div>
`;
});
document.getElementById("sales").innerText=sales;
document.getElementById("profit").innerText=profit;
document.getElementById("orders").innerText=orders;
updateCartTotal();
localStorage.setItem("products",JSON.stringify(products));
}

function addCart(i){
if(products[i].stock<=0){alert("Out of stock");return}
cart.push(i);
products[i].stock--;
render();
}

function updateCartTotal(){
let t=0;
cart.forEach(i=>t+=products[i].sp);
document.getElementById("cartTotal").innerText=t;
}

function openCart(){
if(cart.length==0){alert("Cart Empty");return}
let html="";
let total=0;
cart.forEach((i,index)=>{
total+=products[i].sp;
html+=`
<div style="display:flex;justify-content:space-between">
<span>${products[i].name} - ₹${products[i].sp}</span>
<button onclick="removeItem(${index})">❌</button>
</div>
`;
});
html+=`<hr><b>Total ₹${total}</b>`;
document.getElementById("cartItems").innerHTML=html;
document.getElementById("cartPopup").style.display="flex";
}

function closeCart(){
document.getElementById("cartPopup").style.display="none";
}

function removeItem(index){
let p=cart[index];
products[p].stock++;
cart.splice(index,1);
if(cart.length==0){closeCart()}
render();
openCart();
}

function clearCart(){
cart.forEach(i=>products[i].stock++);
cart=[];
closeCart();
render();
}

function placeOrder(){
let name=document.getElementById("custName").value;
let phone=document.getElementById("custPhone").value;
if(name==""||phone==""){alert("Enter details");return}

let id="ORD"+Date.now();
let total=0;
let msg=`Order ID: ${id}%0AName: ${name}%0APhone: ${phone}%0A`;

cart.forEach(i=>{
msg+=`${products[i].name} - ₹${products[i].sp}%0A`;
total+=products[i].sp;
profit+=(products[i].sp-products[i].cp);
});
sales+=total;
orders++;

localStorage.setItem("sales",sales);
localStorage.setItem("profit",profit);
localStorage.setItem("orders",orders);

let wa=localStorage.getItem("wa");
window.open(`https://wa.me/${wa}?text=${msg}`);

cart=[];
closeCart();
render();
}

function login(){
let u=prompt("Username");
let p=prompt("Password");
let c=JSON.parse(localStorage.getItem("cred"));
if(u==c.u&&p==c.p){
admin=true;
document.getElementById("adminPanel").classList.remove("hidden");
render();
}
}

function logout(){
admin=false;
document.getElementById("adminPanel").classList.add("hidden");
render();
}

function addProduct(){
let n=prompt("Name");
let sp=Number(prompt("Selling Price"));
let cp=Number(prompt("Cost Price"));
let st=Number(prompt("Stock"));
let unit=prompt("Unit");
products.push({name:n,sp,cp,stock:st,unit,sold:0});
render();
}

function edit(i){
let p=products[i];
p.name=prompt("Name",p.name);
p.sp=Number(prompt("SP",p.sp));
p.cp=Number(prompt("CP",p.cp));
p.stock=Number(prompt("Stock",p.stock));
p.unit=prompt("Unit",p.unit);
render();
}

function del(i){
products.splice(i,1);
render();
}

function changeCred(){
let u=prompt("New Username");
let p=prompt("New Password");
localStorage.setItem("cred",JSON.stringify({u,p}));
alert("Changed");
}

function changeWA(){
let n=prompt("WhatsApp Number with country code");
localStorage.setItem("wa",n);
alert("Updated");
}

function toggleDark(){
document.body.classList.toggle("dark");
}

function search(v){
v=v.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none"
});
}

render();
</script>
</body>
</html>
