<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Kirana Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f5;
transition:.3s;
}

header{
background:#2e7d32;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:6px 10px;
margin:4px;
border-radius:6px;
font-size:13px;
}

.hero{
min-height:260px;
background-image:
linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
url("https://images.unsplash.com/photo-1604719312566-8912e9c8a213?auto=format&fit=crop&w=1200&q=80");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,.1);
}

.controls button{
padding:4px 8px;
}

.fixed{
position:fixed;
bottom:15px;
right:15px;
}

.hidden{display:none;}

.dark{
background:#121212;
color:white;
}

.dark .card{
background:#1e1e1e;
}

</style>
</head>
<body>

<header>
<b>🛒 Special Kirana Store</b>
<div>
<button onclick="toggleDark()">🌙</button>
<button onclick="login()">Admin</button>
</div>
</header>

<div class="hero">
<h2>Welcome in Special Kirana Store</h2>
</div>

<div style="padding:8px;">
📊 Sales ₹<span id="sales">0</span> |
💰 Profit ₹<span id="profit">0</span> |
🧾 Orders <span id="orders">0</span>
</div>

<div id="adminPanel" class="hidden" style="padding:8px;">
<button onclick="addProduct()">Add Product</button>
<button onclick="changeLogin()">Change Login</button>
<button onclick="logout()">Logout</button>
</div>

<div id="products" class="grid"></div>

<div class="fixed">
<button onclick="checkout()">Checkout ₹<span id="cartTotal">0</span></button>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [
{name:"Atta",price:30,stock:19,unit:"kg"},
{name:"Rice",price:55,stock:20,unit:"kg"},
{name:"Chana",price:80,stock:50,unit:"kg"}
];

let cart=[];
let sales=0;
let profit=0;
let orders=0;
let admin=false;

let loginData = JSON.parse(localStorage.getItem("loginData")) || {user:"admin",pass:"1234"};

function render(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card">
<b>${p.name}</b><br>
₹${p.price}<br>
Stock: ${p.stock} ${p.unit}<br>
<div class="controls">
<button onclick="add(${i})">+</button>
<button onclick="removeItem(${i})">-</button>
</div>
${admin ? `
<button onclick="editProduct(${i})">Edit</button>
<button onclick="deleteProduct(${i})">Delete</button>
` : ""}
</div>
`;
});
document.getElementById("products").innerHTML=html;
}

function add(i){
if(products[i].stock>0){
products[i].stock--;
cart.push(products[i]);
updateCart();
render();
}
}

function removeItem(i){
products[i].stock++;
updateCart();
render();
}

function updateCart(){
let total=cart.reduce((sum,p)=>sum+p.price,0);
document.getElementById("cartTotal").innerText=total;
}

function checkout(){
if(cart.length==0) return;
let total=cart.reduce((sum,p)=>sum+p.price,0);
sales+=total;
orders++;
document.getElementById("sales").innerText=sales;
document.getElementById("orders").innerText=orders;
cart=[];
updateCart();
alert("Order Successful");
}

function login(){
let u=prompt("Username:");
let p=prompt("Password:");
if(u===loginData.user && p===loginData.pass){
admin=true;
document.getElementById("adminPanel").classList.remove("hidden");
render();
}
}

function logout(){
admin=false;
document.getElementById("adminPanel").classList.add("hidden");
render();
}

function addProduct(){
let n=prompt("Product Name");
let pr=prompt("Price");
let st=prompt("Stock");
let unit=prompt("Unit (kg/pcs)");
products.push({name:n,price:Number(pr),stock:Number(st),unit:unit});
save();
render();
}

function editProduct(i){
let pr=prompt("New Price",products[i].price);
let st=prompt("New Stock",products[i].stock);
products[i].price=Number(pr);
products[i].stock=Number(st);
save();
render();
}

function deleteProduct(i){
products.splice(i,1);
save();
render();
}

function changeLogin(){
let u=prompt("New Username");
let p=prompt("New Password");
loginData={user:u,pass:p};
localStorage.setItem("loginData",JSON.stringify(loginData));
alert("Login Changed");
}

function save(){
localStorage.setItem("products",JSON.stringify(products));
}

function toggleDark(){
document.body.classList.toggle("dark");
}

render();
</script>
</body>
</html>
