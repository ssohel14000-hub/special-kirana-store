<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Kirana Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f5;
transition:0.3s;
}
.dark{
background:#1e1e1e;
color:white;
}
header{
background:#2e7d32;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}
button{
background:#2e7d32;
color:white;
border:none;
padding:6px 10px;
margin:3px;
border-radius:5px;
font-size:12px;
}
.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin:5px;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
padding:10px;
}
.hero{
height:160px;
background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url('https://images.unsplash.com/photo-1604719312566-8912e0e3f75c');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:18px;
}
.bottomCart{
position:fixed;
bottom:15px;
right:15px;
}
.hidden{
display:none;
}
</style>
</head>
<body>

<header>
<span>🛒 Special Kirana</span>
<div>
<button onclick="toggleDark()">🌙</button>
<button onclick="login()">Admin</button>
</div>
</header>

<div class="hero">
Mobile Business Master Version
</div>

<div style="padding:8px;">
📊 Sales ₹<span id="sales">0</span> |
💰 Profit ₹<span id="profit">0</span> |
📦 Orders <span id="orders">0</span>
</div>

<div id="adminPanel" class="hidden" style="padding:8px;">
<button onclick="addProduct()">Add Product</button>
<button onclick="changeCred()">Change Username/Password</button>
<button onclick="changeWA()">Change WhatsApp</button>
<button onclick="backup()">Backup</button>
<button onclick="restore()">Restore</button>
<button onclick="logout()">Logout</button>
</div>

<div id="products" class="grid"></div>

<div id="history" style="padding:10px;"></div>

<div class="bottomCart">
<button onclick="viewCart()">Cart ₹<span id="cartTotal">0</span></button>
<button onclick="orderWA()">WhatsApp</button>
</div>

<script>
let products=JSON.parse(localStorage.getItem("products"))||[
{name:"Atta",sp:30,cp:20,stock:25,unit:"kg",sold:0},
{name:"Rice",sp:55,cp:40,stock:20,unit:"kg",sold:0},
{name:"Oil",sp:140,cp:110,stock:15,unit:"L",sold:0}
];
let cart=[];
let admin=false;
let profit=Number(localStorage.getItem("profit"))||0;
let sales=Number(localStorage.getItem("sales"))||0;
let orders=Number(localStorage.getItem("orders"))||0;

if(!localStorage.getItem("cred")){
localStorage.setItem("cred",JSON.stringify({u:"admin",p:"1234"}));
}
if(!localStorage.getItem("wa")){
localStorage.setItem("wa","919876543210");
}

function clean(v){
if(!v) return 0;
return Number(v.toString().replace(/[^0-9]/g,''))||0;
}

function render(){
document.getElementById("products").innerHTML="";
products.forEach((p,i)=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML=`
<b>${p.name}</b><br>
₹${p.sp}<br>
Stock: ${p.stock} ${p.unit}<br>
Qty:<input id="q${i}" type="number" value="1" style="width:50px"><br>
<button onclick="addCart(${i})">Add</button>
${admin?`
<button onclick="edit(${i})">Edit</button>
<button onclick="del(${i})">Delete</button>`:""}
`;
document.getElementById("products").appendChild(div);
});
updateStats();
}

function updateStats(){
document.getElementById("profit").innerText=profit;
document.getElementById("sales").innerText=sales;
document.getElementById("orders").innerText=orders;
}

function addCart(i){
let q=clean(document.getElementById("q"+i).value);
if(q<=0||q>products[i].stock) return alert("Invalid Qty");
cart.push({i,q});
products[i].stock-=q;
products[i].sold+=q;
render();
updateCart();
}

function updateCart(){
let total=0;
cart.forEach(c=> total+=products[c.i].sp*c.q);
document.getElementById("cartTotal").innerText=total;
}

function viewCart(){
alert("Items: "+cart.length);
}

function orderWA(){
if(cart.length==0) return alert("Cart empty");
let id="ORD"+Date.now();
let text=`Order ID: ${id}%0A`;
cart.forEach(c=>{
let p=products[c.i];
text+=`${p.name} ${c.q}${p.unit}%0A`;
sales+=p.sp*c.q;
profit+=(p.sp-p.cp)*c.q;
});
orders++;
localStorage.setItem("profit",profit);
localStorage.setItem("sales",sales);
localStorage.setItem("orders",orders);
localStorage.setItem("products",JSON.stringify(products));
let wa=localStorage.getItem("wa");
window.open(`https://wa.me/${wa}?text=${text}`);
cart=[];
updateCart();
render();
}

function login(){
let u=prompt("Username");
let p=prompt("Password");
let cred=JSON.parse(localStorage.getItem("cred"));
if(u==cred.u && p==cred.p){
admin=true;
document.getElementById("adminPanel").classList.remove("hidden");
render();
}
}

function logout(){
admin=false;
document.getElementById("adminPanel").classList.add("hidden");
render();
}

function addProduct(){
let n=prompt("Name");
let sp=clean(prompt("Selling Price"));
let cp=clean(prompt("Cost Price"));
let st=clean(prompt("Stock"));
let unit=prompt("Unit (kg/L/g/pcs)");
products.push({name:n,sp,cp,stock:st,unit,sold:0});
localStorage.setItem("products",JSON.stringify(products));
render();
}

function edit(i){
let p=products[i];
p.name=prompt("Name",p.name);
p.sp=clean(prompt("SP",p.sp));
p.cp=clean(prompt("CP",p.cp));
p.stock=clean(prompt("Stock",p.stock));
p.unit=prompt("Unit",p.unit);
localStorage.setItem("products",JSON.stringify(products));
render();
}

function del(i){
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
render();
}

function changeCred(){
let u=prompt("New Username");
let p=prompt("New Password");
localStorage.setItem("cred",JSON.stringify({u,p}));
alert("Changed");
}

function changeWA(){
let n=prompt("New WhatsApp Number with country code");
localStorage.setItem("wa",n);
alert("WhatsApp Updated");
}

function toggleDark(){
document.body.classList.toggle("dark");
}

function backup(){
alert(JSON.stringify(products));
}

function restore(){
let d=prompt("Paste Backup Data");
if(d){
products=JSON.parse(d);
localStorage.setItem("products",d);
render();
}
}

render();
</script>
</body>
</html>
