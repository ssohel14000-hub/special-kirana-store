<!DOCTYPE html>
<html>
<head>
<title>Special Kirana Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* Header */
header{
background:#2e7d32;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.login-btn{
background:white;
color:#2e7d32;
font-weight:bold;
}

/* Hero */
.hero{
background:#66bb6a;
color:white;
text-align:center;
padding:40px 20px;
}

/* Products */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h4{
margin:5px 0;
}

.price{
color:#2e7d32;
font-weight:bold;
}

.admin-actions{
margin-top:10px;
}

/* Login Modal */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
padding:8px;
margin:5px;
width:90%;
}

.admin-panel{
text-align:center;
margin:15px;
display:none;
}

.add-btn{
background:#ff9800;
color:white;
}

.logout-btn{
background:red;
color:white;
}

</style>
</head>

<body>

<header>
<h3>🛒 Special Kirana Store</h3>
<button class="login-btn" onclick="openLogin()">Login</button>
</header>

<div class="hero">
<h2>Fresh Kirana Items</h2>
<p>Quality Grocery at Best Price</p>
</div>

<div class="admin-panel" id="adminPanel">
<button class="add-btn" onclick="addItem()">Add Item</button>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="products" id="productList"></div>

<!-- Login Modal -->
<div class="modal" id="loginModal">
<div class="modal-content">
<h3>Admin Login</h3>
<input type="text" id="username" placeholder="Username"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>
</div>

<script>

let isAdmin = false;

let defaultItems = [
{name:"Atta (5kg)",price:250},
{name:"Rice (1kg)",price:55},
{name:"Dal (1kg)",price:120},
{name:"Sugar (1kg)",price:45},
{name:"Salt (1kg)",price:25},
{name:"Oil (1L)",price:140},
{name:"Tea (500g)",price:220},
{name:"Milk Powder",price:320},
{name:"Biscuits Pack",price:30},
{name:"Soap",price:35},
{name:"Shampoo",price:150},
{name:"Toothpaste",price:90},
{name:"Detergent",price:110},
{name:"Masala Packet",price:20},
{name:"Maggi",price:15},
{name:"Chana (1kg)",price:80},
{name:"Besan (1kg)",price:95},
{name:"Cornflakes",price:180},
{name:"Jam Bottle",price:140},
{name:"Butter",price:50}
];

if(!localStorage.getItem("items")){
localStorage.setItem("items", JSON.stringify(defaultItems));
}

function displayItems(){
let items = JSON.parse(localStorage.getItem("items"));
let productList = document.getElementById("productList");
productList.innerHTML = "";

items.forEach((item,index)=>{
productList.innerHTML += `
<div class="card">
<h4>${item.name}</h4>
<p class="price">₹${item.price}</p>
${isAdmin ? `
<div class="admin-actions">
<button onclick="editItem(${index})">Edit</button>
<button onclick="deleteItem(${index})">Delete</button>
</div>
` : ""}
</div>
`;
});
}

displayItems();

function openLogin(){
document.getElementById("loginModal").style.display="flex";
}

function login(){
let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;

if(user==="admin" && pass==="1234"){
isAdmin=true;
document.getElementById("adminPanel").style.display="block";
document.querySelector(".login-btn").style.display="none";
document.getElementById("loginModal").style.display="none";
displayItems();
}else{
alert("Wrong Credentials");
}
}

function logout(){
isAdmin=false;
document.getElementById("adminPanel").style.display="none";
document.querySelector(".login-btn").style.display="inline";
displayItems();
}

function addItem(){
let name = prompt("Enter Item Name");
let price = prompt("Enter Price");

if(name && price){
let items = JSON.parse(localStorage.getItem("items"));
items.push({name:name,price:price});
localStorage.setItem("items", JSON.stringify(items));
displayItems();
}
}

function editItem(index){
let items = JSON.parse(localStorage.getItem("items"));
let newName = prompt("Edit Name", items[index].name);
let newPrice = prompt("Edit Price", items[index].price);

if(newName && newPrice){
items[index]={name:newName,price:newPrice};
localStorage.setItem("items", JSON.stringify(items));
displayItems();
}
}

function deleteItem(index){
let items = JSON.parse(localStorage.getItem("items"));
items.splice(index,1);
localStorage.setItem("items", JSON.stringify(items));
displayItems();
}

</script>

</body>
</html>
