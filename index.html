<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Special Kirana Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f4f8f4;transition:0.3s}
.dark{background:#121212;color:white}
header{background:#2e7d32;color:white;padding:10px;display:flex;justify-content:space-between;align-items:center}
.logo{height:40px}
.hero{position:relative;height:150px;text-align:center;color:white;overflow:hidden}
.hero img{width:100%;height:150px;object-fit:cover;position:absolute;z-index:-1}
.hero-overlay{background:rgba(0,0,0,0.5);height:100%;display:flex;align-items:center;justify-content:center}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:10px}
.card{background:white;padding:10px;border-radius:8px;box-shadow:0 3px 8px rgba(0,0,0,0.1)}
.dark .card{background:#1e1e1e}
button{background:#2e7d32;color:white;border:none;padding:5px 8px;border-radius:5px;margin-top:4px;cursor:pointer}
.cart-box{position:fixed;bottom:15px;right:15px;background:#2e7d32;color:white;padding:10px;border-radius:10px;cursor:pointer}
.popup{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center}
.popup-content{background:white;width:95%;max-width:360px;padding:15px;border-radius:10px;max-height:90vh;overflow:auto}
.dark .popup-content{background:#1e1e1e;color:white}
input{padding:5px;margin:5px 0;width:95%}
.dashboard{margin:10px;background:white;padding:10px;border-radius:8px}
.dark .dashboard{background:#1e1e1e}
</style>
</head>

<body>

<header>
<img id="storeLogo" class="logo">
<div>
<button onclick="toggleDark()">🌙</button>
<input type="file" onchange="uploadLogo(event)">
</div>
</header>

<div class="hero">
<img src="https://images.pexels.com/photos/264636/pexels-photo-264636.jpeg">
<div class="hero-overlay"><h3>Special Kirana Store</h3></div>
</div>

<div class="dashboard">
<b>📊 Today Sales: ₹<span id="dailySales">0</span></b>
</div>

<div class="products" id="productList"></div>

<div class="cart-box" onclick="openCart()">
Cart ₹<span id="cartTotal">0</span>
</div>

<div class="popup" id="cartPopup">
<div class="popup-content">
<h3>Your Cart</h3>
<ul id="cartItems"></ul>
<b>Total: ₹<span id="popupTotal">0</span></b>

<input type="text" id="custName" placeholder="Customer Name">
<input type="text" id="custPhone" placeholder="Phone Number">

<button onclick="placeOrder()">Place Order</button>
<button onclick="clearCart()">Clear Cart</button>
<button onclick="closeCart()">Close</button>
</div>
</div>

<div class="dashboard">
<h3>📜 Order History</h3>
<ul id="orderHistory"></ul>
</div>

<script>
let whatsappNumber="919876543210";
let cart=[];
let dailySales=Number(localStorage.getItem("sales"))||0;
let orders=JSON.parse(localStorage.getItem("orders"))||[];
let darkMode=localStorage.getItem("dark");

if(darkMode==="on"){document.body.classList.add("dark")}

document.getElementById("dailySales").innerText=dailySales;

let items=[
{name:"Atta",price:30},{name:"Rice",price:55},{name:"Dal",price:120},
{name:"Sugar",price:45},{name:"Salt",price:25},{name:"Oil",price:140},
{name:"Tea",price:220},{name:"Milk Powder",price:320},{name:"Biscuits",price:30},
{name:"Maggi",price:15},{name:"Soap",price:35},{name:"Shampoo",price:150},
{name:"Toothpaste",price:90},{name:"Detergent",price:110},{name:"Masala",price:20}
];

function renderItems(){
let html="";
items.forEach((item,i)=>{
html+=`<div class="card">
<h4>${item.name}</h4>
₹${item.price}<br>
Qty:<input type="number" value="1" id="qty${i}" style="width:50px">
<button onclick="addToCart(${i})">Add</button>
</div>`
});
document.getElementById("productList").innerHTML=html;
}
renderItems();

function addToCart(i){
let qty=Number(document.getElementById("qty"+i).value);
cart.push({...items[i],qty});
updateCart();
}

function updateCart(){
let total=0,list="";
cart.forEach((c,index)=>{
total+=c.price*c.qty;
list+=`<li>${c.name} x ${c.qty} <button onclick="removeItem(${index})">❌</button></li>`
});
document.getElementById("cartTotal").innerText=total;
document.getElementById("popupTotal").innerText=total;
document.getElementById("cartItems").innerHTML=list;
}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

function openCart(){document.getElementById("cartPopup").style.display="flex"}
function closeCart(){document.getElementById("cartPopup").style.display="none"}
function clearCart(){cart=[];updateCart()}

function placeOrder(){
let name=document.getElementById("custName").value;
let phone=document.getElementById("custPhone").value;
let total=document.getElementById("popupTotal").innerText;
if(!name||!phone){alert("Fill details");return}

let orderId="ORD"+Date.now();
let date=new Date().toLocaleString();
let text=`Order ID: ${orderId}\nName: ${name}\nPhone: ${phone}\nTotal: ₹${total}\nDate: ${date}`;

dailySales+=Number(total);
localStorage.setItem("sales",dailySales);
document.getElementById("dailySales").innerText=dailySales;

orders.push(text);
localStorage.setItem("orders",JSON.stringify(orders));
renderHistory();

window.open(`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(text)}`);
alert("Order Placed!");

cart=[];
updateCart();
closeCart();
}

function renderHistory(){
let html="";
orders.forEach((o,i)=>{
html+=`<li>${o}<br><button onclick="deleteOrder(${i})">Delete</button></li><hr>`
});
document.getElementById("orderHistory").innerHTML=html;
}
renderHistory();

function deleteOrder(i){
orders.splice(i,1);
localStorage.setItem("orders",JSON.stringify(orders));
renderHistory();
}

function toggleDark(){
document.body.classList.toggle("dark");
localStorage.setItem("dark",document.body.classList.contains("dark")?"on":"off");
}

function uploadLogo(e){
let reader=new FileReader();
reader.onload=function(){
localStorage.setItem("logo",reader.result);
document.getElementById("storeLogo").src=reader.result;
}
reader.readAsDataURL(e.target.files[0]);
}
if(localStorage.getItem("logo")){
document.getElementById("storeLogo").src=localStorage.getItem("logo");
}
</script>

</body>
</html>
