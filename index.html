<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Special Kirana Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f2f7f2;transition:.3s}
.dark{background:#121212;color:#fff}
header{background:#2e7d32;color:white;padding:12px;display:flex;justify-content:space-between;align-items:center}
button{background:#2e7d32;color:#fff;border:none;padding:6px 10px;border-radius:6px;margin:3px;cursor:pointer}
.hero{height:180px;background:url('https://images.pexels.com/photos/264636/pexels-photo-264636.jpeg') center/cover;display:flex;align-items:center;justify-content:center;color:white}
.hero h2{background:rgba(0,0,0,.5);padding:10px 20px;border-radius:10px}
.controls{text-align:center;margin:10px}
input{padding:6px;margin:5px;border-radius:6px;border:1px solid #ccc}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:10px}
.card{background:#fff;padding:12px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.dark .card{background:#1e1e1e}
.stock-low{color:red;font-size:12px}
.cart-box{position:fixed;bottom:15px;right:15px;background:#2e7d32;color:white;padding:12px;border-radius:12px;cursor:pointer}
.popup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);justify-content:center;align-items:center}
.popup-content{background:white;width:95%;max-width:380px;padding:15px;border-radius:12px;max-height:90vh;overflow:auto}
.dark .popup-content{background:#1e1e1e;color:white}
.hidden{display:none}
.dashboard{background:white;margin:10px;padding:10px;border-radius:10px}
.dark .dashboard{background:#1e1e1e}
</style>
</head>
<body>

<header>
<b>🛒 Special Kirana Store</b>
<div>
<button onclick="toggleDark()">🌙</button>
<button onclick="login()">Login</button>
</div>
</header>

<div class="hero">
<h2>Fresh Grocery • Best Price</h2>
</div>

<div class="dashboard">
📊 Today Sales: ₹<span id="sales">0</span>
</div>

<div class="controls">
<input type="text" id="search" placeholder="Search product..." onkeyup="render()">
</div>

<div id="adminPanel" class="controls hidden">
<button onclick="addProduct()">Add Product</button>
<button onclick="resetSales()">Reset Sales</button>
<button onclick="logout()">Logout</button>
</div>

<div class="products" id="productList"></div>

<div class="cart-box" onclick="openCart()">
Cart ₹<span id="cartTotal">0</span>
</div>

<div class="popup" id="cartPopup">
<div class="popup-content">
<h3>Cart Receipt</h3>
<ul id="cartItems"></ul>
<b>Total: ₹<span id="popupTotal">0</span></b><br>

<input id="custName" placeholder="Customer Name">
<input id="custPhone" placeholder="Phone Number">

<button onclick="placeOrder()">Order on WhatsApp</button>
<button onclick="clearCart()">Clear Cart</button>
<button onclick="closeCart()">Close</button>
</div>
</div>

<div class="dashboard">
<h3>📜 Order History</h3>
<ul id="orderHistory"></ul>
</div>

<script>
let admin=false;
let whatsapp="919876543210";

let products=JSON.parse(localStorage.getItem("products"))||[
{name:"Atta",price:30,stock:20},
{name:"Rice",price:55,stock:15},
{name:"Dal",price:120,stock:10},
{name:"Sugar",price:45,stock:12},
{name:"Salt",price:25,stock:25}
];

let cart=[];
let sales=Number(localStorage.getItem("sales"))||0;
let orders=JSON.parse(localStorage.getItem("orders"))||[];

document.getElementById("sales").innerText=sales;

function render(){
let s=document.getElementById("search").value.toLowerCase();
let html="";
products.forEach((p,i)=>{
if(p.name.toLowerCase().includes(s)){
html+=`
<div class="card">
<h4>${p.name}</h4>
₹${p.price}<br>
Stock: ${p.stock<=5?`<span class="stock-low">${p.stock} (Low)</span>`:p.stock}<br>
Qty:<input type="number" value="1" id="qty${i}" style="width:50px"><br>
<button onclick="addToCart(${i})">Add</button>
${admin?`
<button onclick="editProduct(${i})">Edit</button>
<button onclick="deleteProduct(${i})">Delete</button>`:""}
</div>`;
}
});
document.getElementById("productList").innerHTML=html;
}
render();

function addToCart(i){
let qty=Number(document.getElementById("qty"+i).value);
if(qty>products[i].stock){alert("Not enough stock");return}
cart.push({...products[i],qty});
updateCart();
}

function updateCart(){
let total=0,html="";
cart.forEach((c,i)=>{
total+=c.price*c.qty;
html+=`<li>${c.name} x ${c.qty}</li>`;
});
document.getElementById("cartTotal").innerText=total;
document.getElementById("popupTotal").innerText=total;
document.getElementById("cartItems").innerHTML=html;
}

function clearCart(){cart=[];updateCart()}
function openCart(){document.getElementById("cartPopup").style.display="flex"}
function closeCart(){document.getElementById("cartPopup").style.display="none"}

function placeOrder(){
let name=document.getElementById("custName").value;
let phone=document.getElementById("custPhone").value;
if(!name||!phone){alert("Fill details");return}
let id="ORD"+Date.now();
let total=document.getElementById("popupTotal").innerText;
let date=new Date().toLocaleString();

let text=`Order ID: ${id}%0AName: ${name}%0APhone: ${phone}%0ATotal: ₹${total}%0ADate: ${date}`;
window.open(`https://wa.me/${whatsapp}?text=${text}`);

sales+=Number(total);
localStorage.setItem("sales",sales);
document.getElementById("sales").innerText=sales;

orders.push(`${id} - ₹${total}`);
localStorage.setItem("orders",JSON.stringify(orders));
renderOrders();

cart.forEach(c=>{
let p=products.find(pr=>pr.name===c.name);
p.stock-=c.qty;
});
localStorage.setItem("products",JSON.stringify(products));

cart=[];
updateCart();
render();
closeCart();
}

function renderOrders(){
let html="";
orders.forEach((o,i)=>{
html+=`<li>${o} <button onclick="deleteOrder(${i})">Delete</button></li>`;
});
document.getElementById("orderHistory").innerHTML=html;
}
renderOrders();

function deleteOrder(i){
orders.splice(i,1);
localStorage.setItem("orders",JSON.stringify(orders));
renderOrders();
}

function login(){
let u=prompt("Username:");
let p=prompt("Password:");
if(u==="admin"&&p==="1234"){
admin=true;
document.getElementById("adminPanel").classList.remove("hidden");
render();
}else alert("Wrong login");
}

function logout(){
admin=false;
document.getElementById("adminPanel").classList.add("hidden");
render();
}

function addProduct(){
let name=prompt("Product Name:");
let price=prompt("Price:");
let stock=prompt("Stock:");
products.push({name,price:Number(price),stock:Number(stock)});
localStorage.setItem("products",JSON.stringify(products));
render();
}

function editProduct(i){
let name=prompt("Name:",products[i].name);
let price=prompt("Price:",products[i].price);
let stock=prompt("Stock:",products[i].stock);
products[i]={name,price:Number(price),stock:Number(stock)};
localStorage.setItem("products",JSON.stringify(products));
render();
}

function deleteProduct(i){
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
render();
}

function resetSales(){
sales=0;
localStorage.setItem("sales",0);
document.getElementById("sales").innerText=0;
}

function toggleDark(){
document.body.classList.toggle("dark");
}
</script>

</body>
</html>
