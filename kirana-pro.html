<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Kirana Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:url('https://images.unsplash.com/photo-1604719312566-8912e6f30a06?q=80&w=1200') no-repeat center center fixed;
background-size:cover;
}

.overlay{
background:rgba(255,255,255,0.95);
min-height:100vh;
}

header{
background:#2e7d32;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.topbar{
text-align:center;
padding:10px;
font-size:18px;
font-weight:bold;
}

.container{
padding:10px;
}

.card{
background:white;
border-radius:12px;
padding:10px;
margin:8px 0;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

button{
background:#2e7d32;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
margin:3px 0;
}

.cartBtn{
position:fixed;
right:10px;
bottom:10px;
background:#2e7d32;
padding:10px;
border-radius:20px;
color:white;
}

.adminPanel{
background:#f0f0f0;
padding:10px;
display:none;
}

.dark{
background:black;
color:white;
}

.dark .card{
background:#333;
color:white;
}

</style>
</head>

<body>

<div class="overlay">

<header>🛒 Special Kirana Store</header>

<div class="topbar">
Welcome in Special Kirana Store
</div>

<div style="text-align:right;padding:5px;">
<button onclick="toggleDark()">🌙</button>
<button onclick="login()">Admin</button>
</div>

<div class="adminPanel" id="adminPanel">
<button onclick="addProduct()">Add Product</button>
<button onclick="changeLogin()">Change Username/Password</button>
<button onclick="changeWhatsApp()">Change WhatsApp</button>
<button onclick="backup()">Backup</button>
<button onclick="restore()">Restore</button>
<button onclick="logout()">Logout</button>
</div>

<div class="container" id="productList"></div>

<div class="cartBtn" onclick="openCart()">
Cart ₹<span id="cartTotal">0</span>
</div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
{name:"Atta",price:30,stock:20},
{name:"Rice",price:55,stock:15},
{name:"Dal",price:120,stock:25},
{name:"Sugar",price:45,stock:30}
];

let cart=[];
let total=0;
let admin=false;

let loginData=JSON.parse(localStorage.getItem("loginData")) || {user:"admin",pass:"1234"};
let whatsapp=localStorage.getItem("whatsapp") || "919876543210";

function render(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card">
<b>${p.name}</b><br>
₹${p.price}<br>
Stock: ${p.stock}<br>
Qty:<input type="number" id="q${i}" value="1" min="1" style="width:50px;">
<br>
<button onclick="addToCart(${i})">Add</button>
${admin ? `<button onclick="edit(${i})">Edit</button>
<button onclick="del(${i})">Delete</button>` : ``}
</div>
`;
});
document.getElementById("productList").innerHTML=html;
}
render();

function addToCart(i){
let qty=document.getElementById("q"+i).value;
let p=products[i];
cart.push({name:p.name,price:p.price,qty:Number(qty)});
total+=p.price*qty;
document.getElementById("cartTotal").innerText=total;
}

function openCart(){
if(cart.length==0){alert("Cart empty");return;}

let id="ORD"+Math.floor(Math.random()*100000);
let text="Order ID:"+id+"%0A";
cart.forEach(c=>{
text+=c.name+" x"+c.qty+" = ₹"+(c.price*c.qty)+"%0A";
});
text+="Total: ₹"+total;

window.open("https://wa.me/"+whatsapp+"?text="+text);

alert("Order Placed\nOrder ID: "+id);

cart=[];
total=0;
document.getElementById("cartTotal").innerText=0;
}

function login(){
let u=prompt("Username:");
let p=prompt("Password:");

if(u===loginData.user && p===loginData.pass){
admin=true;
document.getElementById("adminPanel").style.display="block";
render();
}
}

function logout(){
admin=false;
document.getElementById("adminPanel").style.display="none";
render();
}

function addProduct(){
let n=prompt("Product Name");
let pr=prompt("Price");
let st=prompt("Stock");
products.push({name:n,price:Number(pr),stock:Number(st)});
localStorage.setItem("products",JSON.stringify(products));
render();
}

function edit(i){
let pr=prompt("New Price",products[i].price);
let st=prompt("New Stock",products[i].stock);
products[i].price=Number(pr);
products[i].stock=Number(st);
localStorage.setItem("products",JSON.stringify(products));
render();
}

function del(i){
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
render();
}

function changeLogin(){
let u=prompt("New Username");
let p=prompt("New Password");
loginData={user:u,pass:p};
localStorage.setItem("loginData",JSON.stringify(loginData));
alert("Login Updated");
}

function changeWhatsApp(){
let w=prompt("New WhatsApp Number with country code");
whatsapp=w;
localStorage.setItem("whatsapp",w);
alert("WhatsApp Updated");
}

function toggleDark(){
document.body.classList.toggle("dark");
}

function backup(){
let data=JSON.stringify(products);
alert("Copy this backup:\n"+data);
}

function restore(){
let data=prompt("Paste backup data");
products=JSON.parse(data);
localStorage.setItem("products",JSON.stringify(products));
render();
}

</script>

</body>
  </html>
